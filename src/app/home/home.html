@if(toys().length > 0) {
<div class="card-wrapper">
    @for (toy of toys(); track toy.id) {
    <mat-card class="toy-card" appearance="outlined">
        <img mat-card-image [src]="getImageUrl(toy)" [alt]="toy.name">
        <mat-card-content class="card-content">
            <mat-card-title>
                <strong>{{toy.name}}</strong>
            </mat-card-title>
            <mat-card-subtitle>{{toy.type.name}} · {{toy.ageGroup.name}}</mat-card-subtitle>
            <p class="toy-desc">{{toy.description}}</p>
            <mat-chip-set>
                <mat-chip>{{toy.targetGroup}}</mat-chip>
                <mat-chip>{{toy.price}} RSD</mat-chip>
                <mat-chip>{{getAverageRating(toy)}}</mat-chip>
            </mat-chip-set>
        </mat-card-content>
        <mat-card-actions>
            <a [routerLink]="'/details/' + toy.id" matButton>
                <mat-icon fontIcon="description" /> Detalji
            </a>
            @if(authService.getActiveUser()) {
            <button matButton (click)="doReserve(toy)">
                <mat-icon fontIcon="add_shopping_cart" /> Rezerviši
            </button>
            }
        </mat-card-actions>
    </mat-card>
    }
</div>
} @else {
<app-loading />
}
