<mat-card class="small-card">
    <mat-card-header>
        <h1>Prijava</h1>
    </mat-card-header>
    <mat-card-content>
        <mat-form-field class="full-width">
            <mat-label>Email</mat-label>
            <input matInput type="email" [(ngModel)]="email">
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Lozinka</mat-label>
            <input matInput type="password" [(ngModel)]="password">
        </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
        <button matButton (click)="doLogin()">
            <mat-icon fontIcon="login" /> Prijavi se
        </button>
        <a routerLink="/register" matButton>
            <mat-icon fontIcon="person_add" /> Nemate nalog?
        </a>
    </mat-card-actions>
</mat-card>
